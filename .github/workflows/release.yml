name: Update for Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "version that should be released"
        required: true
        type: string
      skip-publish:
        description: 'Skip publish?'
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      version:
        description: "version that should be released"
        required: true
        type: string
      skip-publish:
        description: 'Skip publish?'
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [update]
defaults:
  run:
    working-directory: homebrew-mondoo
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # fetch a token for the mondoo-mergebot app
      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.MONDOO_MERGEBOT_APP_ID }}
          private-key: ${{ secrets.MONDOO_MERGEBOT_APP_PRIVATE_KEY }}
          owner: mondoohq
          repositories: |
            homebrew-mondoo
      # Checkout the branch
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: mondoohq/homebrew-mondoo
          token: ${{ steps.generate-token.outputs.token }}
          path: homebrew-mondoo
      # Determine which version should be released based on event type
      - name: Set Version (Workflow Dispatch)
        if: ${{ inputs.version != '' }}
        run: |
          echo VERSION=${{ inputs.version }} >> $GITHUB_ENV
      - name: Set Version (Repository Dispatch)
        if: ${{ github.event_name == 'repository_dispatch' }}
        run: |
          echo VERSION=${{ github.event.client_payload.version }} >> $GITHUB_ENV
      - name: Unified Version
        id: version
        run: |
          echo "Version: $VERSION"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '>=1.23.0'

      # runs go to generate the update
      - run: make update

      # Commit changes
      - name: setup git config
        run: |
          git config user.name "Mondoo Tools"
          git config user.email "<tools@mondoo.com>"

      - name: diff
        run: |
          git diff --color

      # Open a PR and merge it immediately. Direct pushes to master are
      # blocked by an org ruleset (PR required), and "Allow auto-merge" is
      # disabled on this repo, so we merge via the API right after opening
      # the PR. Required reviews on master are 0, so the merge succeeds
      # without human intervention.
      - name: open and merge release PR
        if: ${{ ! inputs.skip-publish }}
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BRANCH="release/v${VERSION}-${GITHUB_RUN_ID}"
          git checkout -b "${BRANCH}"
          git add Formula/cnquery.rb
          git add Formula/cnspec.rb
          git add Formula/mql.rb
          git add Casks/mondoo-cli.rb
          git add Casks/mondoo.rb
          git commit -m "${VERSION}"
          git push origin "${BRANCH}"
          PR_URL=$(gh pr create \
            --repo mondoohq/homebrew-mondoo \
            --base master \
            --head "${BRANCH}" \
            --title "${VERSION}" \
            --body "Automated release bump for ${VERSION}")
          echo "Opened: ${PR_URL}"
          gh pr merge "${PR_URL}" --squash
